<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riftbound Tracker</title>

    <style>
        body {
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .menu {
            display:flex;
            justify-content:center;
            gap:10px;
            padding:10px;
            background:#0b1220;
            position:sticky;
            top:0;
            z-index:100;
        }

        button {
            padding:10px 15px;
            border:none;
            border-radius:8px;
            font-size:14px;
        }

        .screen {
            display:none;
            padding:20px;
        }

        .active { display:block; }

        .score-area {
            height:30vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:60px;
            font-weight:bold;
        }

        .top { background:#1e293b; }
        .bottom { background:#334155; }

        input, select {
            padding:6px;
            border-radius:6px;
            border:none;
        }

        .overtime-box {
            margin-top:10px;
            color:#facc15;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="menu">
    <button onclick="showScreen('tracker')">Tracker</button>
    <button onclick="showScreen('history')">History</button>
    <button onclick="showScreen('stats')">Stats</button>
</div>

<!-- PROFILE SCREEN -->
<div id="profile" class="screen active">
    <h2>Select Profile</h2>

    <select id="profileSelect"></select>
    <button onclick="loadSelectedProfile()">Load</button>

    <hr>

    <h3>Create New Profile</h3>
    <input type="text" id="newProfileName" placeholder="New profile name">
    <button onclick="createProfile()">Create</button>
</div>

<!-- TRACKER -->
<div id="tracker" class="screen">
    <h3 id="currentUser"></h3>

    <div>
        Winning Score:
        <input type="number" id="winInput" min="1" value="8" style="width:60px;">
        <button onclick="setWinningScore()">Set</button>
    </div>

    <h3>Best of 3</h3>
    <div>Match Score: <span id="matchScore">0 - 0</span></div>

    <br>

    <div class="score-area top" id="p1">0</div>
    <div class="score-area bottom" id="p2">0</div>

    <br>
    <button onclick="resetGame()">Reset Game</button>
    <button onclick="startOvertime()">Start Overtime</button>

    <div id="overtimeInfo" class="overtime-box"></div>

</div>

<!-- HISTORY -->
<div id="history" class="screen">
    <h2>Match History</h2>
    <ul id="historyList"></ul>
</div>

<!-- STATS -->
<div id="stats" class="screen">
    <h2>Stats</h2>
    <div>Total Matches: <span id="totalMatches">0</span></div>
    <div>Player 1 Wins: <span id="p1WinsStat">0</span></div>
    <div>Player 2 Wins: <span id="p2WinsStat">0</span></div>
</div>

<script>

    let username = null;
    let p1=0, p2=0, matchP1=0, matchP2=0;
    let winningScore = 8;
    let stats = {};

    let overtime = false;
    let overtimeTurns = 3;

    function getProfiles(){
        return JSON.parse(localStorage.getItem("profiles")) || [];
    }

    function saveProfiles(profiles){
        localStorage.setItem("profiles", JSON.stringify(profiles));
    }

    function refreshProfileDropdown(){
        let select = document.getElementById("profileSelect");
        select.innerHTML="";
        getProfiles().forEach(p=>{
            let opt=document.createElement("option");
            opt.value=p;
            opt.text=p;
            select.appendChild(opt);
        });
    }

    function createProfile(){
        let name=document.getElementById("newProfileName").value.trim();
        if(!name) return;

        let profiles=getProfiles();
        if(!profiles.includes(name)){
            profiles.push(name);
            saveProfiles(profiles);
        }

        refreshProfileDropdown();
        document.getElementById("newProfileName").value="";
    }

    function loadSelectedProfile(){
        let selected=document.getElementById("profileSelect").value;
        if(!selected) return;

        username=selected;
        document.getElementById("currentUser").innerText="Profile: "+username;

        stats=JSON.parse(localStorage.getItem("stats_"+username)) || {
            totalMatches:0,
            p1Wins:0,
            p2Wins:0,
            history:[]
        };

        winningScore=parseInt(localStorage.getItem("win_"+username)) || 8;
        document.getElementById("winInput").value=winningScore;

        showScreen("tracker");
        updateStats();
        updateHistory();
    }

    function save(){
        localStorage.setItem("stats_"+username, JSON.stringify(stats));
    }

    function setWinningScore(){
        winningScore=parseInt(document.getElementById("winInput").value);
        localStorage.setItem("win_"+username, winningScore);
    }

    function showScreen(name){
        document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
        document.getElementById(name).classList.add("active");
    }

    function updateUI(){
        document.getElementById("p1").innerText=p1;
        document.getElementById("p2").innerText=p2;
        document.getElementById("matchScore").innerText=matchP1+" - "+matchP2;

        if(overtime){
            document.getElementById("overtimeInfo").innerText="Overtime Turns Left: "+overtimeTurns;
        } else {
            document.getElementById("overtimeInfo").innerText="";
        }
    }

    function startOvertime(){
        overtime=true;
        overtimeTurns=3;
        updateUI();
    }

    function checkWin(){

        if(overtime){
            if(overtimeTurns<=0){
                let diff=Math.abs(p1-p2);

                if(diff>=2){
                    if(p1>p2) matchP1++;
                    else matchP2++;
                } else {
                    stats.history.unshift("Draw after overtime ("+p1+"-"+p2+")");
                    save();
                    resetGame();
                    return;
                }

                p1=0; p2=0;
                overtime=false;

                if(matchP1==2 || matchP2==2){
                    finalizeMatch();
                }

                updateUI();
                return;
            }
        }

        if(!overtime && (p1>=winningScore || p2>=winningScore)){
            if(p1>p2) matchP1++;
            else matchP2++;

            p1=0; p2=0;

            if(matchP1==2 || matchP2==2){
                finalizeMatch();
            }
        }

        updateUI();
    }

    function finalizeMatch(){
        let winner=matchP1==2?"Player 1":"Player 2";

        stats.totalMatches++;
        if(matchP1==2) stats.p1Wins++;
        if(matchP2==2) stats.p2Wins++;

        stats.history.unshift(winner+" won "+matchP1+"-"+matchP2);
        save();

        matchP1=0; matchP2=0;
    }

    function resetGame(){
        p1=0; p2=0; matchP1=0; matchP2=0;
        overtime=false;
        overtimeTurns=3;
        updateUI();
    }

    function updateStats(){
        document.getElementById("totalMatches").innerText=stats.totalMatches;
        document.getElementById("p1WinsStat").innerText=stats.p1Wins;
        document.getElementById("p2WinsStat").innerText=stats.p2Wins;
    }

    function updateHistory(){
        let list=document.getElementById("historyList");
        list.innerHTML="";
        stats.history.forEach(h=>{
            let li=document.createElement("li");
            li.innerText=h;
            list.appendChild(li);
        });
    }

    function addScore(player){
        if(player==1) p1++;
        if(player==2) p2++;

        if(overtime) overtimeTurns--;

        checkWin();
    }

    function subtractScore(player){
        if(player==1 && p1>0) p1--;
        if(player==2 && p2>0) p2--;
        updateUI();
    }

    let pressTimer;

    document.getElementById("p1").addEventListener("mousedown", ()=>{
        pressTimer=setTimeout(()=>subtractScore(1),500);
    });
    document.getElementById("p1").addEventListener("mouseup", ()=>{
        clearTimeout(pressTimer);
        addScore(1);
    });

    document.getElementById("p2").addEventListener("mousedown", ()=>{
        pressTimer=setTimeout(()=>subtractScore(2),500);
    });
    document.getElementById("p2").addEventListener("mouseup", ()=>{
        clearTimeout(pressTimer);
        addScore(2);
    });

    refreshProfileDropdown();
    updateUI();

</script>

</body>
</html>
